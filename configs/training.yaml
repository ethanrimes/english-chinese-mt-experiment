# Training hyperparameters. The same config drives every scale's run; only
# the `--scale` CLI flag changes which split file gets loaded.

experiment_name: ecmt-sft-v1
output_root: models/runs

data:
  splits_root: data/splits
  dev_file: dev.parquet
  forgetting_probe_file: english_probe.parquet     # ~5K English-only sentences
  scale_filename_template: "scale_{n}.parquet"     # e.g., scale_10000.parquet

prompt:
  # Format used to construct training examples. Directions are added as
  # special tokens (see configs/model.yaml).
  template: "{direction}\n<|src|> {src} <|tgt|> {tgt}"
  direction_tokens:
    en2zh: "<|en2zh|>"
    zh2en: "<|zh2en|>"

trainer:
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 32
  gradient_accumulation_steps: 4          # effective batch 64
  num_train_epochs: 3
  learning_rate: 5.0e-5
  betas: [0.9, 0.95]
  weight_decay: 0.1
  warmup_ratio: 0.03
  lr_scheduler_type: cosine
  max_seq_length: 1024
  gradient_checkpointing: true
  bf16: true
  fp16: false
  optim: adamw_torch_fused
  seed: 42
  data_seed: 42

  # Logging + saving cadence.
  logging_steps: 50
  eval_steps: 500
  save_steps: 500
  save_total_limit: null         # use custom retention (see below)
  load_best_model_at_end: false

# Retention policy applied by our own callback (overrides save_total_limit).
checkpoint_retention:
  rolling_keep: 3                # keep last N rolling checkpoints
  keep_epoch_boundaries: true    # always keep checkpoints at epoch ends
  keep_best_dev_bleu: true       # always keep best-by-dev-BLEU checkpoint

# New embedding rows (Chinese vocab) get higher LR for a short ramp.
new_embedding_param_group:
  enabled: true
  lr_multiplier: 10.0
  decay_to_base_over_steps: 1000

catastrophic_forgetting:
  enabled: true
  probe_every_n_eval_steps: 1
  english_ppl_warn_increase_pct: 20.0
  auto_lr_decay_on_forgetting: false
  early_stop_on_forgetting: false

tracking:
  wandb:
    enabled: true
    project: english-chinese-mt
    tags: ["sft", "smollm2-360m"]
  mlflow:
    enabled: true                # used in AML automatically
    experiment_name: ecmt-sft-v1
  tensorboard:
    enabled: true

eval:
  flores_subset: dev       # 'dev' for in-loop eval; 'devtest' for final report
  directions: [en2zh, zh2en]
  max_new_tokens: 256
  num_beams: 4
  metrics: [bleu, chrf, comet]
  comet_model: Unbabel/wmt22-comet-da
